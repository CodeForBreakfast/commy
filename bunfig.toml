[install]
# Pin to exact versions — no ^ / ~ ranges silently absorbing fresh
# upstream pushes.
exact = true

# Refuse to install package versions less than 7 days old. Supply-chain
# defence against fresh malicious pushes — gives the community time to
# notice before we pull a release.
minimumReleaseAge = 604800

[test]
# Live suites (`*.live.test.ts`) hit real external services and have
# rate-limit blast radius onto other clients sharing the same realm.
# Excluded from default discovery; run explicitly via `bun run test:live`.
pathIgnorePatterns = ["**/*.live.test.ts"]
