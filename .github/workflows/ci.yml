name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    # Pinned to a specific runner image, not `ubuntu-latest`, so a GitHub
    # `-latest` migration can't silently change the build environment. Renovate
    # (github-actions manager, github-runners datasource) bumps this via the
    # same age-gated PRs as the action SHAs; it can't manage `-latest` itself.
    runs-on: ubuntu-24.04
    steps:
      # Actions pinned to commit-SHA digests, not mutable tags/branches, to
      # close the supply-chain hole a force-pushed tag/branch would open. The
      # trailing comment tracks the human-readable version; Renovate
      # (.github/renovate.json5) bumps the SHAs so the pins don't rot.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # All gate tooling (bun + uv) comes from the flake's lean .#ci shell, so
      # the Python gate (//#test:hermes) resolves uv the same way locally and
      # in CI. No setup-bun: bun is in the shell too.
      - run: nix develop .#ci --command bash -euo pipefail -c 'bun install --frozen-lockfile && bun run check'
